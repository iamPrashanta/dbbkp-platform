version: "3.9"

services:
  redis:
    image: redis:7
    container_name: dbbkp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  redis-ui:
    image: rediscommander/redis-commander
    container_name: dbbkp-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
